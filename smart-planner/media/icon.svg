<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background rounded rect -->
  <rect x="4" y="4" width="120" height="120" rx="24" fill="#2563EB"/>
  
  <!-- Document/plan paper -->
  <rect x="28" y="16" width="60" height="88" rx="4" fill="white" opacity="0.95"/>
  
  <!-- Folded corner -->
  <path d="M76 16 L88 28 L76 28 Z" fill="#DBEAFE"/>
  <path d="M76 16 L76 28 L88 28" fill="none" stroke="#93C5FD" stroke-width="1"/>
  
  <!-- Header bar -->
  <rect x="28" y="16" width="48" height="16" rx="4" fill="#1D4ED8"/>
  <rect x="44" y="16" width="32" height="16" fill="#1D4ED8"/>
  
  <!-- Title line -->
  <rect x="36" y="40" width="44" height="4" rx="2" fill="#1E293B"/>
  
  <!-- Subtitle line -->
  <rect x="36" y="50" width="36" height="3" rx="1.5" fill="#94A3B8"/>
  
  <!-- Step 1 - completed (green) -->
  <circle cx="40" cy="64" r="4" fill="#10B981"/>
  <path d="M38 64 L39.5 65.5 L42 62.5" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="48" y="62.5" width="32" height="3" rx="1.5" fill="#475569"/>
  
  <!-- Step 2 - in progress (blue) -->
  <circle cx="40" cy="77" r="4" fill="#3B82F6"/>
  <rect x="38" y="75" width="4" height="4" rx="1" fill="white" opacity="0.6"/>
  <rect x="48" y="75.5" width="28" height="3" rx="1.5" fill="#475569"/>
  
  <!-- Step 3 - pending (gray) -->
  <circle cx="40" cy="90" r="4" fill="#CBD5E1"/>
  <rect x="48" y="88.5" width="24" height="3" rx="1.5" fill="#94A3B8"/>
  
  <!-- Magic wand / AI sparkle -->
  <g transform="translate(88, 80)">
    <!-- Wand body -->
    <line x1="0" y1="24" x2="20" y2="4" stroke="#FBBF24" stroke-width="3" stroke-linecap="round"/>
    <!-- Star sparkle -->
    <path d="M20 0 L21.5 3 L24.5 3.5 L22 5.5 L22.5 8.5 L20 7 L17.5 8.5 L18 5.5 L15.5 3.5 L18.5 3 Z" fill="#FBBF24"/>
    <!-- Small sparkles -->
    <circle cx="8" cy="14" r="1.5" fill="#FCD34D" opacity="0.8"/>
    <circle cx="14" cy="8" r="1" fill="#FCD34D" opacity="0.6"/>
  </g>
</svg>
